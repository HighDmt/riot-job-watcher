name: Check Riot MMO Jobs

on:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours
  workflow_dispatch:       # manual trigger from GitHub UI

# Needed to commit the updated snapshot back to the repo
permissions:
  contents: write

# Serialize runs so a scheduled run and a manual run can't push at once
concurrency:
  group: riot-watcher-snapshot
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: python riot_watcher.py --once
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}

      - name: Commit updated snapshot
        run: |
          if git diff --quiet mmo_jobs.json; then
            echo "No snapshot changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add mmo_jobs.json
            git commit -m "Update job snapshot [skip ci]"
            git push
          fi
